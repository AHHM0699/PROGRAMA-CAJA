<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Yapes</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #f0fdf4;
      color: #1a202c;
      height: 100vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      font-size: 13px;
      user-select: none;
    }

    .w-header {
      background: linear-gradient(135deg, #14532d 0%, #16a34a 100%);
      padding: 5px 10px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
      height: 28px;
    }
    .w-brand {
      font-size: 14px;
      font-weight: 900;
      font-style: italic;
      font-family: Georgia, serif;
      background: linear-gradient(135deg, #22c55e 0%, #eab308 42%, #f97316 70%, #f472b6 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      line-height: 1;
    }
    .w-caja-badge {
      font-size: 9px;
      font-weight: 600;
      color: rgba(255,255,255,.8);
      max-width: 100px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .w-input-area {
      padding: 8px 8px 6px;
      background: #fff;
      border-bottom: 1px solid #e2e8f0;
      flex-shrink: 0;
    }
    .w-input-row { display: flex; gap: 6px; align-items: center; }
    .w-prefix {
      position: absolute;
      left: 8px;
      font-size: 11px;
      font-weight: 700;
      color: #94a3b8;
      pointer-events: none;
    }
    .w-input-wrap { position: relative; flex: 1; display: flex; align-items: center; }
    .w-input {
      width: 100%;
      padding: 6px 6px 6px 26px;
      border: 2px solid #e2e8f0;
      border-radius: 7px;
      font-size: 16px;
      font-weight: 700;
      font-family: inherit;
      color: #14532d;
      background: #f8fafc;
      transition: border-color .15s;
      height: 34px;
    }
    .w-input:focus {
      outline: none;
      border-color: #16a34a;
      background: #fff;
      box-shadow: 0 0 0 2px rgba(22,163,74,.12);
    }
    .w-btn-add {
      width: 34px;
      height: 34px;
      background: #16a34a;
      color: #fff;
      border: none;
      border-radius: 7px;
      font-size: 20px;
      font-weight: 700;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: background .12s, transform .1s;
      line-height: 1;
    }
    .w-btn-add:hover  { background: #15803d; }
    .w-btn-add:active { transform: scale(.92); }

    .w-feedback {
      font-size: 10px;
      color: #16a34a;
      font-weight: 600;
      min-height: 12px;
      margin-top: 3px;
      padding-left: 2px;
    }

    /* Login */
    #loginScreen {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 10px 8px;
      gap: 6px;
      background: #fff;
    }
    .w-form-input {
      width: 100%;
      padding: 6px 9px;
      border: 2px solid #e2e8f0;
      border-radius: 7px;
      font-size: 12px;
      font-family: inherit;
      color: #1a202c;
      background: #fff;
    }
    .w-form-input:focus { outline: none; border-color: #16a34a; }
    .w-btn-primary {
      width: 100%;
      padding: 7px;
      background: #16a34a;
      color: #fff;
      border: none;
      border-radius: 7px;
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
      font-family: inherit;
    }
    .w-btn-primary:hover { background: #15803d; }
    .w-error { color: #dc2626; font-size: 10px; text-align: center; min-height: 12px; }

    /* Status / selector */
    #wStatus {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 8px;
      gap: 5px;
      background: #fff;
    }
    .w-status-msg { font-size: 11px; color: #64748b; text-align: center; }
    .w-caja-btn {
      width: 100%;
      padding: 6px 10px;
      background: #fff;
      border: 1px solid #e2e8f0;
      border-radius: 7px;
      cursor: pointer;
      text-align: left;
      font-size: 11px;
      font-weight: 600;
      color: #14532d;
      font-family: inherit;
      transition: background .12s, border-color .12s;
    }
    .w-caja-btn:hover { background: #f0fdf4; border-color: #86efac; }
    #wCajasList { width: 100%; display: flex; flex-direction: column; gap: 5px; }
  </style>
</head>
<body>

<div class="w-header">
  <span class="w-brand">Che plaS</span>
  <span class="w-caja-badge" id="wCajaNombre">Yapes</span>
</div>

<!-- LOGIN -->
<div id="loginScreen" style="display:none">
  <input type="email"    id="wEmail" class="w-form-input" placeholder="Correo"
    onkeypress="if(event.key==='Enter') document.getElementById('wPass').focus()">
  <input type="password" id="wPass"  class="w-form-input" placeholder="Contraseña"
    onkeypress="if(event.key==='Enter') wLogin()">
  <button class="w-btn-primary" onclick="wLogin()">Ingresar</button>
  <p id="wLoginError" class="w-error"></p>
</div>

<!-- STATUS / SELECTOR -->
<div id="wStatus" style="display:none">
  <p class="w-status-msg" id="wStatusMsg">Cargando…</p>
  <div id="wCajasList"></div>
</div>

<!-- MAIN: solo input -->
<div id="widgetMain" style="display:none">
  <div class="w-input-area">
    <div class="w-input-row">
      <div class="w-input-wrap">
        <span class="w-prefix">S/.</span>
        <input type="number" id="wYapeInput" class="w-input"
          placeholder="0.00" step="0.01" min="0"
          onkeydown="if(event.key==='Enter'){event.preventDefault();wAddYape()}">
      </div>
      <button class="w-btn-add" onclick="wAddYape()" title="Agregar (Enter)">+</button>
    </div>
    <p class="w-feedback" id="wFeedback"></p>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script>
'use strict';

firebase.initializeApp({
  apiKey:            'AIzaSyAhujUO4G1CMgdXXecomb1oMBiW9uWwkHY',
  authDomain:        'programa-caja.firebaseapp.com',
  projectId:         'programa-caja',
  storageBucket:     'programa-caja.firebasestorage.app',
  messagingSenderId: '622065869233',
  appId:             '1:622065869233:web:60a043430ee81937e29d90',
});

const auth = firebase.auth();
const db   = firebase.firestore();

auth.setPersistence(firebase.auth.Auth.Persistence.LOCAL).catch(() => {});

let _cajaId  = null;
let _unsub   = null;
let _yapesRaw = '';
let _fbTimer = null;

auth.onAuthStateChanged(user => {
  if (user) { show('wStatus'); hide('loginScreen'); loadCajas(); }
  else       { hide('widgetMain'); hide('wStatus'); show('loginScreen'); }
});

async function wLogin() {
  const email = document.getElementById('wEmail').value.trim();
  const pass  = document.getElementById('wPass').value;
  const errEl = document.getElementById('wLoginError');
  errEl.textContent = '';
  try { await auth.signInWithEmailAndPassword(email, pass); }
  catch(e) { errEl.textContent = 'Credenciales incorrectas'; }
}

async function loadCajas() {
  setStatus('Buscando cajas…');
  document.getElementById('wCajasList').innerHTML = '';
  try {
    const snap  = await db.collection('cajas').get();
    const cajas = snap.docs.map(d => ({ id: d.id, ...d.data() }))
      .sort((a,b) => new Date(b.aperturaFecha||0) - new Date(a.aperturaFecha||0));
    if (!cajas.length) {
      setStatus('Sin cajas abiertas');
      document.getElementById('wCajasList').innerHTML =
        '<button class="w-caja-btn" onclick="loadCajas()">↻ Buscar</button>';
      return;
    }
    if (cajas.length === 1) { selectCaja(cajas[0].id, cajas[0].nombre || 'Caja'); return; }
    setStatus('Selecciona una caja:');
    document.getElementById('wCajasList').innerHTML = cajas.map(c =>
      `<button class="w-caja-btn" onclick="selectCaja('${c.id}','${esc(c.nombre||'Caja')}')">
        ${esc(c.nombre || 'Sin nombre')}
       </button>`).join('');
  } catch(e) { setStatus('Error'); console.error(e); }
}

function selectCaja(id, nombre) {
  _cajaId = id;
  document.getElementById('wCajaNombre').textContent = nombre;
  if (_unsub) _unsub();
  _unsub = db.doc(`cajas/${id}`).onSnapshot(snap => {
    if (!snap.exists) {
      _cajaId = null;
      hide('widgetMain'); show('wStatus');
      setStatus('Caja cerrada');
      document.getElementById('wCajasList').innerHTML =
        '<button class="w-caja-btn" onclick="loadCajas()">↻ Buscar otra</button>';
      return;
    }
    _yapesRaw = snap.data().yapesRaw || '';
  }, e => console.warn(e));
  hide('wStatus'); show('widgetMain');
  setTimeout(() => document.getElementById('wYapeInput').focus(), 50);
}

async function wAddYape() {
  const input = document.getElementById('wYapeInput');
  const val   = parseFloat(input.value);
  if (!val || val <= 0 || !_cajaId) { input.select(); return; }
  const newRaw = _yapesRaw ? _yapesRaw + '\n' + val.toFixed(2) : val.toFixed(2);
  input.value  = '';
  input.focus();
  const fb = document.getElementById('wFeedback');
  fb.textContent = `✓ S/. ${val.toFixed(2)}`;
  clearTimeout(_fbTimer);
  _fbTimer = setTimeout(() => { fb.textContent = ''; }, 1800);
  try {
    _yapesRaw = newRaw;
    await db.doc(`cajas/${_cajaId}`).update({ yapesRaw: newRaw, _ts: Date.now() });
  } catch(e) { console.error(e); }
}

function show(id) { document.getElementById(id).style.display = 'flex'; }
function hide(id) { document.getElementById(id).style.display = 'none'; }
function setStatus(msg) { document.getElementById('wStatusMsg').textContent = msg; }
function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}
</script>
</body>
</html>
