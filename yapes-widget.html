<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Yapes — Che plaS</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #f0fdf4;
      color: #1a202c;
      height: 100vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    /* ── Header ── */
    .w-header {
      background: linear-gradient(135deg, #14532d 0%, #16a34a 100%);
      color: #fff;
      padding: 10px 14px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }
    .w-brand {
      font-size: 20px;
      font-weight: 900;
      font-style: italic;
      font-family: Georgia, serif;
      background: linear-gradient(135deg, #22c55e 0%, #eab308 42%, #f97316 70%, #f472b6 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .w-caja-badge {
      font-size: 11px;
      font-weight: 600;
      background: rgba(255,255,255,.2);
      border: 1px solid rgba(255,255,255,.35);
      padding: 3px 9px;
      border-radius: 10px;
      max-width: 140px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    /* ── Login ── */
    #loginScreen {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px 20px;
      gap: 10px;
    }
    .w-login-sub { font-size: 13px; color: #64748b; margin-bottom: 4px; }

    /* ── Status / selector ── */
    #wStatus {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
      gap: 10px;
      text-align: center;
    }
    .w-status-msg { font-size: 14px; color: #64748b; }
    .w-caja-btn {
      width: 100%;
      padding: 11px 14px;
      background: #fff;
      border: 1px solid #e2e8f0;
      border-radius: 8px;
      cursor: pointer;
      text-align: left;
      font-size: 14px;
      font-weight: 600;
      color: #14532d;
      font-family: inherit;
      transition: background .15s, border-color .15s;
    }
    .w-caja-btn:hover { background: #f0fdf4; border-color: #86efac; }
    #wCajasList { width: 100%; display: flex; flex-direction: column; gap: 8px; margin-top: 4px; }

    /* ── Main widget ── */
    #widgetMain {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* Input area */
    .w-input-area {
      padding: 12px 14px;
      background: #fff;
      border-bottom: 1px solid #e2e8f0;
      flex-shrink: 0;
    }
    .w-input-row { display: flex; gap: 8px; }
    .w-input {
      flex: 1;
      padding: 9px 12px;
      border: 2px solid #e2e8f0;
      border-radius: 8px;
      font-size: 20px;
      font-weight: 700;
      font-family: inherit;
      color: #14532d;
      transition: border-color .2s;
      background: #f8fafc;
    }
    .w-input:focus { outline: none; border-color: #16a34a; background: #fff; box-shadow: 0 0 0 3px rgba(22,163,74,.1); }
    .w-btn-add {
      padding: 9px 18px;
      background: #16a34a;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 22px;
      font-weight: 700;
      cursor: pointer;
      transition: background .15s, transform .1s;
      font-family: inherit;
      line-height: 1;
    }
    .w-btn-add:hover  { background: #15803d; }
    .w-btn-add:active { transform: scale(.95); }

    /* Total bar */
    .w-total-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 7px 14px;
      background: #f0fdf4;
      border-bottom: 1px solid #bbf7d0;
      flex-shrink: 0;
    }
    .w-total-label  { font-size: 12px; font-weight: 700; color: #64748b; text-transform: uppercase; letter-spacing: .05em; }
    .w-total-amount { font-size: 18px; font-weight: 800; color: #16a34a; }

    /* Yapes list */
    .w-list {
      flex: 1;
      overflow-y: auto;
      padding: 6px 14px 10px;
    }
    .w-yape-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 7px 0;
      border-bottom: 1px solid #f1f5f9;
      font-size: 14px;
    }
    .w-yape-item:last-child { border-bottom: none; }
    .w-yape-num { color: #94a3b8; font-size: 11px; margin-right: 6px; min-width: 18px; }
    .w-yape-val { font-weight: 700; color: #14532d; }
    .w-yape-err { color: #dc2626; font-size: 12px; font-style: italic; }
    .w-empty    { color: #94a3b8; font-size: 13px; padding: 16px 0; text-align: center; }

    /* Feedback flash */
    .w-feedback {
      font-size: 11px;
      color: #16a34a;
      font-weight: 600;
      min-height: 14px;
      margin-top: 4px;
    }

    /* Shared form controls */
    .w-form-input {
      width: 100%;
      padding: 9px 12px;
      border: 2px solid #e2e8f0;
      border-radius: 8px;
      font-size: 14px;
      font-family: inherit;
      color: #1a202c;
      background: #fff;
      transition: border-color .2s;
    }
    .w-form-input:focus { outline: none; border-color: #16a34a; }
    .w-btn-primary {
      width: 100%;
      padding: 10px;
      background: #16a34a;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      font-family: inherit;
      transition: background .15s;
    }
    .w-btn-primary:hover { background: #15803d; }
    .w-error { color: #dc2626; font-size: 12px; text-align: center; min-height: 16px; }

    /* Scrollbar */
    .w-list::-webkit-scrollbar { width: 4px; }
    .w-list::-webkit-scrollbar-track { background: transparent; }
    .w-list::-webkit-scrollbar-thumb { background: #bbf7d0; border-radius: 4px; }
  </style>
</head>
<body>

<!-- Header -->
<div class="w-header">
  <span class="w-brand">Che plaS</span>
  <span class="w-caja-badge" id="wCajaNombre">Yapes</span>
</div>

<!-- LOGIN -->
<div id="loginScreen" style="display:none">
  <p class="w-login-sub">Ingresa tus credenciales</p>
  <input type="email" id="wEmail" class="w-form-input" placeholder="Correo electrónico"
    onkeypress="if(event.key==='Enter') document.getElementById('wPass').focus()">
  <input type="password" id="wPass" class="w-form-input" placeholder="Contraseña"
    onkeypress="if(event.key==='Enter') wLogin()" style="margin-top:8px">
  <button class="w-btn-primary" onclick="wLogin()" style="margin-top:10px">Ingresar</button>
  <p id="wLoginError" class="w-error"></p>
</div>

<!-- STATUS / SELECTOR -->
<div id="wStatus" style="display:none">
  <p class="w-status-msg" id="wStatusMsg">Cargando…</p>
  <div id="wCajasList"></div>
</div>

<!-- MAIN WIDGET -->
<div id="widgetMain" style="display:none">
  <div class="w-input-area">
    <div class="w-input-row">
      <input type="number" id="wYapeInput" class="w-input"
        placeholder="0.00" step="0.01" min="0"
        onkeydown="if(event.key==='Enter'){event.preventDefault();wAddYape()}">
      <button class="w-btn-add" onclick="wAddYape()" title="Agregar (Enter)">+</button>
    </div>
    <p class="w-feedback" id="wFeedback"></p>
  </div>
  <div class="w-total-bar">
    <span class="w-total-label">Total yapes</span>
    <span class="w-total-amount" id="wTotal">S/. 0.00</span>
  </div>
  <div class="w-list" id="wYapesList">
    <p class="w-empty">Sin yapes aún</p>
  </div>
</div>

<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script>
'use strict';

firebase.initializeApp({
  apiKey:            'AIzaSyAhujUO4G1CMgdXXecomb1oMBiW9uWwkHY',
  authDomain:        'programa-caja.firebaseapp.com',
  projectId:         'programa-caja',
  storageBucket:     'programa-caja.firebasestorage.app',
  messagingSenderId: '622065869233',
  appId:             '1:622065869233:web:60a043430ee81937e29d90',
});

const auth = firebase.auth();
const db   = firebase.firestore();

let _cajaId   = null;
let _unsub    = null;
let _yapesRaw = '';
let _fbTimer  = null;

// ── Auth ─────────────────────────────────────────────────────
auth.onAuthStateChanged(user => {
  if (user) {
    show('wStatus');
    hide('loginScreen');
    loadCajas();
  } else {
    hide('widgetMain');
    hide('wStatus');
    show('loginScreen');
  }
});

async function wLogin() {
  const email = document.getElementById('wEmail').value.trim();
  const pass  = document.getElementById('wPass').value;
  const errEl = document.getElementById('wLoginError');
  errEl.textContent = '';
  try {
    await auth.signInWithEmailAndPassword(email, pass);
  } catch(e) {
    errEl.textContent = 'Credenciales incorrectas';
  }
}

// ── Caja detection ───────────────────────────────────────────
async function loadCajas() {
  setStatus('Buscando cajas abiertas…');
  document.getElementById('wCajasList').innerHTML = '';
  try {
    const snap  = await db.collection('cajas').get();
    const cajas = snap.docs.map(d => ({ id: d.id, ...d.data() }))
      .sort((a,b) => new Date(b.aperturaFecha||0) - new Date(a.aperturaFecha||0));

    if (cajas.length === 0) {
      setStatus('⏳ No hay cajas abiertas');
      document.getElementById('wCajasList').innerHTML =
        '<button class="w-caja-btn" onclick="loadCajas()">↻ Volver a buscar</button>';
      return;
    }
    if (cajas.length === 1) {
      selectCaja(cajas[0].id, cajas[0].nombre || 'Caja');
      return;
    }
    setStatus('Selecciona una caja:');
    document.getElementById('wCajasList').innerHTML = cajas.map(c =>
      `<button class="w-caja-btn" onclick="selectCaja('${c.id}','${esc(c.nombre||'Caja')}')">
        ${esc(c.nombre || 'Sin nombre')}
       </button>`
    ).join('');
  } catch(e) {
    setStatus('Error al cargar cajas');
    console.error(e);
  }
}

function selectCaja(id, nombre) {
  _cajaId = id;
  document.getElementById('wCajaNombre').textContent = nombre;

  if (_unsub) _unsub();
  _unsub = db.doc(`cajas/${id}`).onSnapshot(snap => {
    if (!snap.exists) {
      _cajaId = null;
      hide('widgetMain');
      show('wStatus');
      setStatus('⚠️ Esta caja fue cerrada');
      document.getElementById('wCajasList').innerHTML =
        '<button class="w-caja-btn" onclick="loadCajas()">↻ Buscar otra caja</button>';
      return;
    }
    _yapesRaw = snap.data().yapesRaw || '';
    renderYapes();
  }, e => console.warn('snapshot error:', e));

  hide('wStatus');
  show('widgetMain');
  setTimeout(() => document.getElementById('wYapeInput').focus(), 50);
}

// ── Yapes ────────────────────────────────────────────────────
function renderYapes() {
  const lines = _yapesRaw.split('\n').map(l => l.trim()).filter(Boolean);
  let total = 0, html = '';

  lines.forEach((line, i) => {
    const val = parseFloat(line);
    if (!isNaN(val) && val > 0) {
      total += val;
      html += `<div class="w-yape-item">
        <span><span class="w-yape-num">${i+1}.</span>
        <span class="w-yape-val">S/. ${val.toFixed(2)}</span></span>
      </div>`;
    } else {
      html += `<div class="w-yape-item">
        <span><span class="w-yape-num">${i+1}.</span>
        <span class="w-yape-err">${esc(line)}</span></span>
      </div>`;
    }
  });

  const list = document.getElementById('wYapesList');
  list.innerHTML = html || '<p class="w-empty">Sin yapes aún</p>';
  document.getElementById('wTotal').textContent = 'S/. ' + total.toFixed(2);
  list.scrollTop = list.scrollHeight;
}

async function wAddYape() {
  const input = document.getElementById('wYapeInput');
  const val   = parseFloat(input.value);
  if (!val || val <= 0 || !_cajaId) { input.select(); return; }

  const newRaw = _yapesRaw ? _yapesRaw + '\n' + val.toFixed(2) : val.toFixed(2);
  input.value  = '';
  input.focus();

  // Feedback visual
  const fb = document.getElementById('wFeedback');
  fb.textContent = `✓ S/. ${val.toFixed(2)} agregado`;
  clearTimeout(_fbTimer);
  _fbTimer = setTimeout(() => { fb.textContent = ''; }, 2000);

  try {
    await db.doc(`cajas/${_cajaId}`).update({ yapesRaw: newRaw, _ts: Date.now() });
  } catch(e) { console.error('Error guardando yape:', e); }
}

// ── Helpers ──────────────────────────────────────────────────
function show(id) { document.getElementById(id).style.display = 'flex'; }
function hide(id) { document.getElementById(id).style.display = 'none'; }
function setStatus(msg) { document.getElementById('wStatusMsg').textContent = msg; }
function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}
</script>
</body>
</html>
