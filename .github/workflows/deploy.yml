name: Deploy to GitHub Pages
# DESACTIVADO — el hosting se hace exclusivamente via Firebase (firebase.yml)
# Este workflow queda aqui como referencia pero nunca se ejecuta.
on:
  workflow_dispatch:
    inputs:
      confirm:
        description: "Escribe CONFIRMAR para activar deploy a Pages"
        required: true

jobs:
  deploy:
    if: ${{ github.event.inputs.confirm == 'CONFIRMAR' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v4
      - uses: actions/upload-pages-artifact@v3
        with:
          path: "."
      - uses: actions/deploy-pages@v4
